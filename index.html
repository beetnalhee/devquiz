<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>DevQuiz - 개발자 퀴즈</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      :root {
        --primary: #6c5ce7;
        --primary-light: #a29bfe;
        --primary-dark: #5a4bd1;
        --correct: #00b894;
        --correct-bg: #e8faf5;
        --wrong: #e17055;
        --wrong-bg: #fdf0ed;
        --bg: #f8f9fe;
        --card: #ffffff;
        --text: #2d3436;
        --text-secondary: #636e72;
        --border: #e9ecef;
        --shadow: 0 2px 16px rgba(108, 92, 231, 0.08);
        --shadow-lg: 0 8px 32px rgba(108, 92, 231, 0.12);
      }

      body {
        font-family: "Noto Sans KR", -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100dvh;
        display: flex;
        justify-content: center;
        overflow-x: hidden;
      }

      #app {
        width: 100%;
        max-width: 480px;
        min-height: 100dvh;
        position: relative;
        background: var(--bg);
      }

      /* ===== Start Screen ===== */
      .screen {
        display: none;
        min-height: 100dvh;
        padding: 0 24px;
      }

      .screen.active {
        display: flex;
        flex-direction: column;
      }

      .start-screen {
        justify-content: center;
        align-items: center;
        gap: 32px;
        text-align: center;
        background: linear-gradient(160deg, #6c5ce7 0%, #a29bfe 100%);
        padding: 40px 24px;
      }

      .logo-area {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      .logo-icon {
        width: 96px;
        height: 96px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 48px;
        backdrop-filter: blur(10px);
      }

      .logo-title {
        font-size: 32px;
        font-weight: 800;
        color: #fff;
        letter-spacing: -0.5px;
      }

      .logo-subtitle {
        font-size: 16px;
        color: rgba(255, 255, 255, 0.85);
        line-height: 1.6;
        max-width: 280px;
      }

      .start-stats {
        display: flex;
        gap: 24px;
        justify-content: center;
      }

      .stat-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }

      .stat-number {
        font-size: 28px;
        font-weight: 700;
        color: #fff;
      }

      .stat-label {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.7);
      }

      .start-btn {
        width: 100%;
        max-width: 300px;
        padding: 18px 32px;
        background: #fff;
        color: var(--primary);
        border: none;
        border-radius: 16px;
        font-size: 18px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        font-family: inherit;
      }

      .start-btn:active {
        transform: scale(0.97);
      }

      .category-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
        max-width: 320px;
      }

      .category-tag {
        padding: 6px 14px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 20px;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(5px);
      }

      /* ===== Quiz Screen ===== */
      .quiz-screen {
        padding-top: 0;
      }

      .quiz-header {
        position: sticky;
        top: 0;
        background: var(--card);
        padding: 16px 24px 12px;
        z-index: 10;
        border-bottom: 1px solid var(--border);
      }

      .quiz-header-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }

      .quiz-progress-text {
        font-size: 14px;
        font-weight: 600;
        color: var(--primary);
      }

      .quiz-score {
        font-size: 14px;
        color: var(--text-secondary);
        font-weight: 500;
      }

      .progress-bar {
        height: 6px;
        background: var(--border);
        border-radius: 3px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--primary), var(--primary-light));
        border-radius: 3px;
        transition: width 0.4s ease;
      }

      .quiz-body {
        padding: 24px 24px 32px;
        flex: 1;
      }

      .question-category {
        display: inline-block;
        padding: 4px 12px;
        background: linear-gradient(135deg, var(--primary), var(--primary-light));
        color: #fff;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 16px;
      }

      .question-text {
        font-size: 18px;
        font-weight: 600;
        line-height: 1.6;
        color: var(--text);
        margin-bottom: 28px;
        word-break: keep-all;
      }

      .options-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .option-btn {
        width: 100%;
        padding: 16px 20px;
        background: var(--card);
        border: 2px solid var(--border);
        border-radius: 14px;
        font-size: 15px;
        font-weight: 500;
        color: var(--text);
        cursor: pointer;
        transition: all 0.2s;
        text-align: left;
        display: flex;
        align-items: flex-start;
        gap: 12px;
        line-height: 1.5;
        font-family: inherit;
        box-shadow: var(--shadow);
      }

      .option-btn:active:not(.disabled) {
        transform: scale(0.98);
      }

      .option-btn:not(.disabled):hover {
        border-color: var(--primary-light);
        background: #f5f3ff;
      }

      .option-label {
        flex-shrink: 0;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: var(--bg);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 700;
        color: var(--text-secondary);
      }

      .option-btn.correct {
        border-color: var(--correct);
        background: var(--correct-bg);
      }

      .option-btn.correct .option-label {
        background: var(--correct);
        color: #fff;
      }

      .option-btn.wrong {
        border-color: var(--wrong);
        background: var(--wrong-bg);
      }

      .option-btn.wrong .option-label {
        background: var(--wrong);
        color: #fff;
      }

      .option-btn.disabled {
        cursor: default;
        opacity: 0.6;
      }

      .option-btn.correct.disabled,
      .option-btn.wrong.disabled {
        opacity: 1;
      }

      /* ===== Explanation ===== */
      .explanation-card {
        margin-top: 24px;
        padding: 20px;
        border-radius: 14px;
        line-height: 1.7;
        font-size: 14px;
        animation: slideUp 0.3s ease;
      }

      .explanation-card.correct {
        background: var(--correct-bg);
        border: 1px solid rgba(0, 184, 148, 0.2);
      }

      .explanation-card.wrong {
        background: var(--wrong-bg);
        border: 1px solid rgba(225, 112, 85, 0.2);
      }

      .explanation-result {
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .explanation-card.correct .explanation-result {
        color: var(--correct);
      }

      .explanation-card.wrong .explanation-result {
        color: var(--wrong);
      }

      .explanation-text {
        color: var(--text);
      }

      .next-btn {
        width: 100%;
        padding: 16px;
        margin-top: 20px;
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        color: #fff;
        border: none;
        border-radius: 14px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
        box-shadow: 0 4px 16px rgba(108, 92, 231, 0.3);
      }

      .next-btn:active {
        transform: scale(0.97);
      }

      /* ===== Result Screen ===== */
      .result-screen {
        justify-content: center;
        align-items: center;
        gap: 28px;
        text-align: center;
        padding: 40px 24px;
      }

      .result-circle {
        width: 160px;
        height: 160px;
        border-radius: 50%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--card);
        box-shadow: var(--shadow-lg);
        position: relative;
      }

      .result-circle::before {
        content: "";
        position: absolute;
        inset: -4px;
        border-radius: 50%;
        background: conic-gradient(
          var(--primary) var(--score-deg, 0deg),
          var(--border) var(--score-deg, 0deg)
        );
        z-index: -1;
      }

      .result-score {
        font-size: 42px;
        font-weight: 800;
        color: var(--primary);
      }

      .result-total {
        font-size: 14px;
        color: var(--text-secondary);
        font-weight: 500;
      }

      .result-title {
        font-size: 24px;
        font-weight: 700;
      }

      .result-message {
        font-size: 15px;
        color: var(--text-secondary);
        line-height: 1.6;
        max-width: 300px;
      }

      .result-details {
        display: flex;
        gap: 32px;
      }

      .result-detail {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }

      .result-detail-icon {
        font-size: 24px;
      }

      .result-detail-number {
        font-size: 22px;
        font-weight: 700;
      }

      .result-detail-label {
        font-size: 13px;
        color: var(--text-secondary);
      }

      .result-detail.correct-detail .result-detail-number {
        color: var(--correct);
      }

      .result-detail.wrong-detail .result-detail-number {
        color: var(--wrong);
      }

      .result-buttons {
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: 100%;
        max-width: 300px;
      }

      .retry-btn {
        width: 100%;
        padding: 16px;
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        color: #fff;
        border: none;
        border-radius: 14px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
        box-shadow: 0 4px 16px rgba(108, 92, 231, 0.3);
      }

      .retry-btn:active {
        transform: scale(0.97);
      }

      .home-btn {
        width: 100%;
        padding: 16px;
        background: var(--card);
        color: var(--text);
        border: 2px solid var(--border);
        border-radius: 14px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
      }

      .home-btn:active {
        transform: scale(0.97);
      }

      /* ===== Animations ===== */
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .fade-in {
        animation: fadeIn 0.3s ease;
      }

      /* ===== Remaining Badge ===== */
      .remaining-badge {
        padding: 8px 16px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 12px;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(5px);
      }

      /* ===== History Button ===== */
      .history-btn {
        width: 100%;
        max-width: 300px;
        padding: 14px 32px;
        background: rgba(255, 255, 255, 0.15);
        color: #fff;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 16px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
        backdrop-filter: blur(5px);
      }

      .history-btn:active {
        transform: scale(0.97);
      }

      /* ===== History Screen ===== */
      .history-summary {
        display: flex;
        gap: 24px;
        justify-content: center;
      }

      .history-summary-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }

      .history-summary-number {
        font-size: 24px;
        font-weight: 700;
        color: var(--primary);
      }

      .history-summary-label {
        font-size: 13px;
        color: var(--text-secondary);
      }

      .history-list {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-height: 360px;
        overflow-y: auto;
        padding: 0 4px;
      }

      .history-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 16px;
        background: var(--card);
        border-radius: 12px;
        box-shadow: var(--shadow);
      }

      .history-item-left {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .history-round {
        font-size: 15px;
        font-weight: 600;
        color: var(--text);
      }

      .history-date {
        font-size: 12px;
        color: var(--text-secondary);
      }

      .history-item-right {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 2px;
      }

      .history-score {
        font-size: 18px;
        font-weight: 700;
      }

      .history-score.high {
        color: var(--correct);
      }

      .history-score.mid {
        color: #fdcb6e;
      }

      .history-score.low {
        color: var(--wrong);
      }

      .history-detail {
        font-size: 12px;
        color: var(--text-secondary);
      }

      .clear-btn {
        width: 100%;
        padding: 12px;
        background: transparent;
        color: var(--text-secondary);
        border: none;
        border-radius: 14px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        font-family: inherit;
      }

      .clear-btn:active {
        color: var(--wrong);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- Start Screen -->
      <div id="start-screen" class="screen start-screen active">
        <div class="logo-area">
          <div class="logo-icon">&lt;/&gt;</div>
          <h1 class="logo-title">DevQuiz</h1>
          <p class="logo-subtitle">
            개발자 커뮤니티에서 자주 나오는 핵심 질문들로 실력을 테스트해보세요
          </p>
        </div>

        <div class="start-stats">
          <div class="stat-item">
            <span class="stat-number" id="total-questions">20</span>
            <span class="stat-label">문제</span>
          </div>
          <div class="stat-item">
            <span class="stat-number" id="total-categories">10</span>
            <span class="stat-label">카테고리</span>
          </div>
        </div>

        <div class="category-tags" id="category-tags"></div>

        <button class="start-btn" onclick="startQuiz()">퀴즈 시작하기</button>
      </div>

      <!-- Quiz Screen -->
      <div id="quiz-screen" class="screen quiz-screen">
        <div class="quiz-header">
          <div class="quiz-header-top">
            <span class="quiz-progress-text" id="progress-text">1 / 20</span>
            <span class="quiz-score" id="score-text">0점</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
          </div>
        </div>

        <div class="quiz-body" id="quiz-body"></div>
      </div>

      <!-- Result Screen -->
      <div id="result-screen" class="screen result-screen"></div>
    </div>

    <script src="questions.js"></script>
    <script src="app.js"></script>
  </body>
</html>
